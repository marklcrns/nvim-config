# Syntax{{{

# Coding tools
# ----------------------------------------

[[plugins]]
repo = 'junegunn/vim-easy-align'
on_ft = '[vim, md, vimwiki, json, go, html, js, jsx, py, css, java, less, tmpl, toml, xml, sql, Dockerfile]'
hook_source = '''
  source ~/.config/nvim/config/plugins/vim-easy-align.vim
'''

[[plugins]]
repo = 'kana/vim-niceblock'
on_map = '{ x: <Plug> }'
hook_add = 'let g:niceblock_no_default_key_mappings = 0'

[[plugins]]
repo = 'tyru/caw.vim'
on_map = '{ nx: <Plug> }'

[[plugins]]
repo = 'machakann/vim-sandwich'
on_map = 'vonx: <Plug>(operator-sandwich'
hook_add = '''
let g:sandwich_no_default_key_mappings = 1
let g:operator_sandwich_no_default_key_mappings = 1
let g:textobj_sandwich_no_default_key_mappings = 1
'''

[[plugins]]
repo = 'Raimondi/delimitMate'
on_event = 'FileType'
hook_source = '''
  source ~/.config/nvim/config/plugins/delimitMate.vim
'''
# }}}


# Git{{{
[[plugins]]
repo = 'lambdalisue/gina.vim'
on_cmd = 'Gina'

[[plugins]]
repo = 'rhysd/committia.vim'
on_event = 'BufReadPost'
hook_add = '''
let g:committia_hooks = {}
function! g:committia_hooks.edit_open(info)
" Additional settings
setlocal spell

" If no commit message, start with insert mode
if a:info.vcs ==# 'git' && getline(1) ==# ''
    startinsert
endif

" Scroll the diff window from insert mode
" Map <C-n> and <C-p>
imap <buffer><C-n> <Plug>(committia-scroll-diff-down-half)
imap <buffer><C-p> <Plug>(committia-scroll-diff-up-half)
endfunction
'''

[[plugins]]
repo = 'tpope/vim-fugitive'
on_cmd = '[G, Git, Gfetch, Gpush, Gstatus, Glog, Gclog, Gllog, Gdiffsplit, Gvdiffsplit]'
# }}}

# Markdown
# ---------------------------------------
[[plugins]]
repo = 'plasticboy/vim-markdown'
on_ft = 'markdown'
hook_add = '''
  source ~/.config/nvim/config/plugins/vim-markdown.vim
'''

# If build failed, manually install dependencies:
# cd ~/.cache/vim/dein/repos/github.com/iamcco/markdown-preview.nvim/app && yarn install
[[plugins]]
repo = 'iamcco/markdown-preview.nvim'
on_ft = ['markdown', 'pandoc.markdown', 'rmd']
build = 'sh -c "cd app && yarn install"'
hook_source = '''
  source $VIM_PATH/config/plugins/markdown-preview.vim
'''

# Python
# ----------------------------------------
[[plugins]]
repo = 'tmhedberg/SimpylFold'
on_ft = 'python'

[[plugins]]
repo = 'vim-scripts/python_match.vim'
on_ft = 'python'

[[plugins]]
repo = 'raimon49/requirements.txt.vim'
on_ft = 'requirements'
# }}}

