[[plugins]]

repo = 'romainl/vim-cool'
on_event = '[ CursorMoved, InsertEnter ]'

[[plugins]]
repo = 'junegunn/fzf'
merged = '0'
on_cmd = 'FZF'
type__depth = '1'
hook_source = '''
let g:fzf_layout = { 'down': '~25%' }
'''

[[plugins]]
repo = 'junegunn/fzf.vim'
depends = 'fzf'
merged = '0'
on_cmd = '[ Files, GitFiles, Buffers, Lines, Locate, Colors, Ag, Rg, Tags ]'
on_func = '[ fzf#vim#with_preview, fzf#run, vista#finder#fzf#Run ]'

[[plugins]]
repo = 'liuchengxu/vim-clap'
hook_source = '''
  source ~/.config/nvim/config/plugins/vim-clap.vim
'''

[[plugins]]
repo = 'junegunn/gv.vim'
depends = 'vim-fugitive'
on_cmd = 'GV'

[[plugins]]
repo = 'ludovicchabant/vim-gutentags'
on_if = 'executable('ctags')'
on_event = '[BufReadPost, BufWritePost]'
hook_source = '''
  source ~/.config/nvim/config/plugins/vim-gutentags.vim
'''

[[plugins]]
repo = 'liuchengxu/vista.vim'
on_cmd = 'Vista'
hook_source = '''
  source ~/.config/nvim/config/plugins/vista.vim
'''

[[plugins]]
repo = 'liuchengxu/vim-which-key'
on_cmd = '[Whichkey, Whichkey!]'
hook_add = '''
  source ~/.config/nvim/config/plugins/whichkey.vim
'''
hook_post_source = '''
call which_key#register('<Space>', 'g:which_key_map')
call which_key#register(';', 'g:which_key_localmap')
call which_key#register(']', 'g:which_key_rsbgmap')
call which_key#register('[', 'g:which_key_lsbgmap')
call which_key#register('d', 'g:which_key_dmap')
call which_key#register('s', 'g:which_key_smap')
call which_key#register('g', 'g:which_key_gmap')
'''

[[plugins]]
repo = 'airblade/vim-rooter'
on_event = 'FileType'
hook_add = '''
let g:rooter_change_directory_for_non_project_files = 'current'
let g:rooter_manual_only = 1
let g:rooter_patterns = [
  \ '=src',
  \ '.git/',
  \ 'README.*',
  \ 'node_modules/',
  \ 'pom.xml',
  \ 'env/',
  \ '.root',
  \ '.editorconfig',
  \ ]
let g:rooter_silent_chdir = 1
let g:rooter_resolve_links = 1
let g:rooter_cd_cmd = 'lcd'
'''

# Only load when in wiki directory
[[plugins]]
repo = 'vimwiki/vimwiki'
on_if = '(getcwd() =~ $HOME . "/Docs/wiki.\*" && &filetype == "markdown")'
on_cmd = '[VimwikIndex, VimwikiDiaryIndex, VimwikiUISelect]'
hook_add = '''
let g:vimwiki_use_calendar = 1
let g:vimwiki_hl_headers = 1
let g:vimwiki_hl_cb_checked = 1
let g:vimwiki_autowriteall = 0
let g:vimwiki_folding = 'custom'
let g:vimwiki_key_mappings =
  \ {
  \   'all_maps': 1,
  \   'global': 1,
  \   'headers': 1,
  \   'text_objs': 1,
  \   'table_format': 1,
  \   'table_mappings': 0,
  \   'lists': 1,
  \   'links': 1,
  \   'html': 1,
  \   'mouse': 0,
  \ }
let g:vimwiki_map_prefix = '<LocalLeader>w'
'''
hook_source = '''
  source ~/.config/nvim/config/plugins/vimwiki.vim
'''

# Only load when in wiki diary sub directory
[[plugins]]
repo = 'tbabej/taskwiki'
on_if = '''
(expand('%:p') =~ $HOME . "/Docs/wiki/wiki/md/diary/.\*" && &filetype == 'vimwiki')
'''
depends = 'vimwiki'
hook_source = '''
  source ~/.config/nvim/config/plugins/taskwiki.vim
'''

